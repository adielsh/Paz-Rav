# Local infrastructure for Paz Rav — the two datastores the modular monolith needs.
# `docker compose up -d` gives you Postgres (durable state) + Redis (hot state / pub-sub).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paz
      POSTGRES_PASSWORD: paz
      POSTGRES_DB: pazrav
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paz -d pazrav"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
