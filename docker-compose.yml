# Local infrastructure for Paz Rav — the two datastores the modular monolith needs.
# `docker compose up -d` gives you Postgres (durable state) + Redis (hot state / pub-sub).
services:
  postgres:
    # pgvector/pgvector is a drop-in superset of the official postgres:16 image — same
    # PGDATA, env vars and wire protocol — that ships the `vector` extension the
    # close-timing case memory uses (store/postgres_case_memory.py). Swapping back to
    # postgres:16 just makes case memory fall back to in-memory; nothing else changes.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: paz
      POSTGRES_PASSWORD: paz
      POSTGRES_DB: pazrav
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paz -d pazrav"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The AI close-timing debate, extracted as its OWN deployable — the one part of the AI
  # layer with a real trigger to scale separately (it's slow + LLM-bound). Same image as
  # the app, different entrypoint. The app calls it over HTTP and falls back in-process if
  # it's down (a small circuit breaker in agents/close_advisor.py), so this stays a truly
  # optional, independently-deployable microservice — not a hard dependency.
  advisor:
    build: .
    command: ["uvicorn", "paz_rav.services.advisor.app:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 6

  # The engine + dashboard, containerized. `docker compose up -d --build` brings up the
  # ENTIRE stack (DB + Redis + advisor + app) with one command — and this is the same image
  # you'd push to ECR/App Runner/ECS later (docs/DEPLOYMENT.md).
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      advisor:
        condition: service_started   # loosely coupled: the app has an in-process fallback
    environment:
      PAZ_PERSIST: redis_postgres
      PAZ_DATA: ${PAZ_DATA:-fixture}
      DATABASE_URL: postgresql://paz:paz@postgres:5432/pazrav
      REDIS_URL: redis://redis:6379/0
      ADVISOR_URL: http://advisor:8001
      UNDERLYINGS: ${UNDERLYINGS:-SPX,SPY,QQQ,IWM,NVDA,MSFT,GOOGL,AMZN,CSCO}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      ALLOWED_EMAIL: ${ALLOWED_EMAIL:-}
      GMAIL_ADDRESS: ${GMAIL_ADDRESS:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pgdata:
  redisdata:
