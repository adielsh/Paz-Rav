# Local infrastructure for Paz Rav — the two datastores the modular monolith needs.
# `docker compose up -d` gives you Postgres (durable state) + Redis (hot state / pub-sub).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paz
      POSTGRES_PASSWORD: paz
      POSTGRES_DB: pazrav
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paz -d pazrav"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The engine + dashboard, containerized. `docker compose up -d --build` brings up the
  # ENTIRE stack (DB + Redis + app) with one command — and this is the same image you'd
  # push to ECR/App Runner/ECS later (docs/DEPLOYMENT.md).
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PAZ_PERSIST: redis_postgres
      PAZ_DATA: ${PAZ_DATA:-fixture}
      DATABASE_URL: postgresql://paz:paz@postgres:5432/pazrav
      REDIS_URL: redis://redis:6379/0
      UNDERLYINGS: ${UNDERLYINGS:-SPX,SPY,QQQ,IWM,NVDA,MSFT,GOOGL,AMZN,CSCO}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      ALLOWED_EMAIL: ${ALLOWED_EMAIL:-}
      GMAIL_ADDRESS: ${GMAIL_ADDRESS:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pgdata:
  redisdata:
